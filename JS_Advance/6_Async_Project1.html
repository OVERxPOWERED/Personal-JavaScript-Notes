<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>

<body>
    <h1>Click the start button to start changing background color</h1>
    <h1>Click the stop button to stop changing background color</h1>
    <button id="start">start</button>
    <button id="stop">stop</button>
    <button id="reset">reset</button>


    <script>
        let Start = document.querySelector('#start');
        let Stop = document.querySelector('#stop');
        let Reset = document.querySelector('#reset');
        let intervalId, color, hex, rgb;

        document.body.style.transitionDuration = '1s'

        function handleStart() {
            intervalId = setInterval(() => {

                // rgb version
                rgb = [0, 0, 0];
                for (i = 0; i < 3; i++) {
                    rgb[i] = Math.round(Math.random() * 255);
                }
                document.body.style.background = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`
                console.log(`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`);

                // hex version
                // hex = "0123456789ABCDEF";
                // color = '#'
                // for(i = 0; i<6; i++){
                //     let index = Math.round(Math.random() * 15);
                //     color += hex[index];
                // }
                // document.body.style.background = `${color}`
                // console.log(`${color}`);
                // color = "#"
            }, 1500)
        }

        function handleStop() {
            clearInterval(intervalId);
            intervalId = null;
        }

        Start.addEventListener('click', handleStart);
        Stop.addEventListener('click', handleStop); 
        Reset.addEventListener('click',()=>{
            document.body.style.background = '#ffffff'
            clearInterval(intervalId);
            intervalId = null;
        })
    </script>
</body>

</html>
